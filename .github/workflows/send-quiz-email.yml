name: Send Daily Quiz Email

on:
  push:
    branches: [main]
    paths:
      - 'biblerecap_quiz_day*.html'

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Send email via Gmail
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          QUIZ_FILE=$(git diff --name-only HEAD~1 HEAD | grep 'biblerecap_quiz_day.*\.html' | head -1)
          echo "Detected quiz file: '$QUIZ_FILE'"
          if [ -z "$QUIZ_FILE" ]; then
            echo "No quiz file detected — skipping."
            exit 0
          fi
          QUIZ_FILE="$QUIZ_FILE" python3 send_email.py
